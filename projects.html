    /* ══════════════════════════════════════════════════════
         MAIN WRAPPER — projects grid
      ══════════════════════════════════════════════════════ */

    .projects-outer {
      padding: 40px 60px 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Override the section padding since outer handles it */
    .projects-main .projects-section {
      padding: 0 !important;
    }

    /* ── Creator / Team row on project card ── */
    .project-creator-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(71, 160, 184, 0.1);
    }

    .project-creator-name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.81rem;
      color: rgba(255, 255, 255, 0.52);
    }

    .project-creator-name i {
      color: #47a0b8;
      font-size: 0.73rem;
    }

    .project-team-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      font-weight: 600;
      color: #47a0b8;
      background: rgba(71, 160, 184, 0.09);
      border: 1px solid rgba(71, 160, 184, 0.24);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .project-team-badge i {
      font-size: 0.7rem;
    }

    /* ── Modal creator row ── */
    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .modal-creator-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.87rem;
      color: rgba(255, 255, 255, 0.48);
    }

    .modal-creator-info i {
      color: #47a0b8;
    }

    /* ══════════════════════════════════════════
         RESPONSIVE
      ══════════════════════════════════════════ */

        padding: 40px 30px 0;
