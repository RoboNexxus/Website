  <style>
    /* ── Creator / Team row on project card ── */
    .project-creator-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(71, 160, 184, 0.1);
    }

    .project-creator-name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.55);
    }

    .project-creator-name i {
      color: #47a0b8;
      font-size: 0.75rem;
    }

    .project-team-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #47a0b8;
      background: rgba(71, 160, 184, 0.1);
      border: 1px solid rgba(71, 160, 184, 0.25);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .project-team-badge i {
      font-size: 0.72rem;
    }

    /* ── Modal creator row ── */
    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .modal-creator-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .modal-creator-info i {
      color: #47a0b8;
    }

    /* ── Voting section ── */
    .voting-section {
      padding: 20px 60px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .voting-section-header {
      margin-bottom: 28px;
    }

    .voting-section-header h2 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .voting-section-header p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.88rem;
    }

    /* Two-column layout */
    .voting-layout {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* Left: voting cards list */
    .voting-left {
      flex: 1;
      min-width: 0;
    }

    /* Right: leaderboard sidebar */
    .voting-right {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 90px;
    }

    /* ── Vote card ── */
    .vote-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid rgba(71, 160, 184, 0.18);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 12px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      gap: 12px;
    }

    .vote-card:hover {
      border-color: rgba(71, 160, 184, 0.45);
      box-shadow: 0 6px 24px rgba(71, 160, 184, 0.08);
    }

    .vote-card--voted {
      border-color: rgba(71, 160, 184, 0.35);
      background: rgba(71, 160, 184, 0.04);
    }

    .vote-card-info {
      flex: 1;
      min-width: 0;
    }

    .vote-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vote-card-team {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .vote-card-team i {
      color: #47a0b8;
      font-size: 0.72rem;
    }

    .vote-card-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .vote-count {
      font-size: 1.3rem;
      font-weight: 700;
      color: #47a0b8;
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Vote button */
    .vote-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border-radius: 10px;
      border: 1.5px solid rgba(71, 160, 184, 0.5);
      background: transparent;
      color: #47a0b8;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .vote-btn:hover:not(:disabled) {
      background: #47a0b8;
      color: #000;
      border-color: #47a0b8;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(71, 160, 184, 0.3);
    }

    .vote-btn--done {
      border-color: rgba(71, 160, 184, 0.3);
      color: rgba(71, 160, 184, 0.5);
      cursor: default;
    }

    .vote-btn--done i {
      color: #47a0b8;
    }

    /* ── Leaderboard sidebar ── */
    .leaderboard-card {
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.95), rgba(28, 28, 28, 0.95));
      border: 1px solid rgba(71, 160, 184, 0.25);
      border-radius: 18px;
      padding: 22px 20px;
    }

    .leaderboard-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(71, 160, 184, 0.15);
      letter-spacing: 0.3px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .lb-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .lb-rank {
      font-size: 1.1rem;
      width: 26px;
      flex-shrink: 0;
      text-align: center;
    }

    .lb-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .lb-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-sublabel {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .lb-votes {
      font-size: 0.82rem;
      font-weight: 700;
      color: #47a0b8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lb-votes i {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .leaderboard-empty {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.3);
      font-style: italic;
      text-align: center;
      padding: 10px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .voting-section {
        padding: 20px 30px 60px;
      }
    }

    @media (max-width: 860px) {
      .voting-layout {
        flex-direction: column;
      }

      .voting-right {
        width: 100%;
        position: static;
      }

      .leaderboard-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0 20px;
      }

      .leaderboard-card h3 {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 600px) {
      .voting-section {
        padding: 20px 18px 50px;
      }

      .vote-card {
        padding: 14px 16px;
      }

      .vote-btn {
        padding: 8px 14px;
      }
    }
  </style>
