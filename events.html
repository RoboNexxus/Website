  <style>
    /* ── Events Page Layout Restructure ── */

    /* Main layout: calendar LEFT + upcoming events RIGHT */
    .events-main-layout {
      display: flex;
      gap: 50px;
      padding: 40px 60px 60px;
      max-width: 1400px;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* Calendar column — fixed width */
    .events-calendar-col {
      flex-shrink: 0;
      width: 380px;
    }

    .events-calendar-col .calendar-container {
      max-width: 100%;
      margin: 0;
      position: sticky;
      top: 90px;
    }

    /* Upcoming events column — fills remaining space */
    .events-upcoming-col {
      flex: 1;
      min-width: 0;
    }

    .events-upcoming-col h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
    }

    /* ── Horizontal event list card ── */
    .event-list-card {
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid rgba(71, 160, 184, 0.2);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .event-list-card:hover {
      border-color: rgba(71, 160, 184, 0.5);
      box-shadow: 0 8px 30px rgba(71, 160, 184, 0.1);
    }

    .event-list-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .event-list-badge {
      background: rgba(71, 160, 184, 0.12);
      border: 1px solid rgba(71, 160, 184, 0.35);
      color: #47a0b8;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      letter-spacing: 0.5px;
    }

    .event-list-register-btn {
      background: #47a0b8;
      border: none;
      color: #000;
      padding: 10px 26px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .event-list-register-btn:hover {
      background: #02cadc;
      transform: scale(1.04);
    }

    .event-list-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .event-list-desc {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .event-list-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .event-list-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.82rem;
    }

    .event-list-meta-item i {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .event-list-coming-soon {
      color: rgba(255, 255, 255, 0.35);
      font-style: italic;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    /* ── Past Events — 3-column grid ── */
    .past-events-section {
      padding: 20px 60px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .past-events-section h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
    }

    .past-events-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .past-event-grid-card {
      background: rgba(15, 15, 15, 0.9);
      border: 1px solid rgba(71, 160, 184, 0.15);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.3s ease;
    }

    .past-event-grid-card:hover {
      border-color: rgba(71, 160, 184, 0.4);
    }

    .past-event-grid-date {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .past-event-grid-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    .past-event-grid-desc {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.87rem;
      line-height: 1.55;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .events-main-layout {
        padding: 40px 30px 60px;
        gap: 30px;
      }

      .events-calendar-col {
        width: 320px;
      }

      .past-events-section {
        padding: 20px 30px 60px;
      }
    }

    @media (max-width: 900px) {
      .events-main-layout {
        flex-direction: column;
        padding: 30px 20px 40px;
      }

      .events-calendar-col {
        width: 100%;
      }

      .events-calendar-col .calendar-container {
        position: static;
        max-width: 400px;
        margin: 0 auto;
      }

      .past-events-section {
        padding: 20px 20px 60px;
      }

      .past-events-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .past-events-grid {
        grid-template-columns: 1fr;
      }

      .event-list-top {
        flex-wrap: wrap;
        gap: 12px;
      }

      .event-list-register-btn {
        margin-left: 0;
      }
    }
  </style>

      <h3 id="reg-event-title"></h3>
      <form id="registration-form">
        <input type="hidden" id="reg-event-id">
        <div class="reg-form-group">
          <label for="reg-name">Full Name</label>

        </div>
        <div class="reg-form-group">

          <input type="email" id="reg-email" name="email" required placeholder="Enter your email">
        </div>
        <div class="reg-form-group">
          <label for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" name="phone" required placeholder="Enter your phone number">
        </div>
        <div class="reg-form-group">
          <label for="reg-class">Class/Grade</label>
          <select id="reg-class" name="class" required>
            <option value="">Select your class</option>
            <option value="9">Class 9</option>
            <option value="10">Class 10</option>
            <option value="11">Class 11</option>

        <button type="submit" class="reg-submit-btn">Register Now</button>
